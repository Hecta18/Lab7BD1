services:
  postgres:
    image: postgres:16-alpine
    container_name: retailmax-postgres
    environment:
      POSTGRES_USER: retailmax
      POSTGRES_PASSWORD: retailmax
      POSTGRES_DB: retailmax
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./DDL.sql:/docker-entrypoint-initdb.d/01-ddl.sql:ro
      - ./DATA.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailmax -d retailmax"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  metabase:
    image: metabase/metabase:v0.50.13
    container_name: retailmax-metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_LOAD_SAMPLE_DATA: "false"
      JAVA_TIMEZONE: America/Guatemala
    volumes:
      - ./metabase-data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg-data:
